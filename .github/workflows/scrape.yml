name: Daily Scraper

on:
  schedule:
    - cron: "30 0 * * *" # 6:00 AM IST every day
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run The Hindu spider
        working-directory: thehindu_scraper
        run: scrapy crawl thehindu -o ../thehindu_$(date +%Y-%m-%d).json

      - name: Run The Indian Express spider
        working-directory: thehindu_scraper
        run: scrapy crawl theindianexpress -o ../indianexpress_$(date +%Y-%m-%d).json

      - name: Upload scraped data
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data-${{ github.run_id }}
          path: "*.json"
          retention-days: 30
